<!DOCTYPE html>
<html>
    <head>
        <title>Dino Nugs AI</title>
        <link rel="stylesheet" href="styles.css">

    </head>
    <body>
        <div class="chat-container">
            <header>
                <h1>Dino Chatbot 🦕</h1>
            </header>
            <div id="chat-box" class="chat-box">
                <div class="message bot-message">RAWR! I'm Anzu, your 65-million-year-old AI dinosaur chatbot! Ask me anything about dinosaurs!</div>
                <div class="message user-message">User Hi</div>
                <div class="input-area">
                    <input type="text" id="user-input" placeholder="Type your message...">
                    <button id="send-btn">Send</button>
                </div>

            </div>
        </div>

    <script src="scripts.js" defer></script>
    </body>
</html>
